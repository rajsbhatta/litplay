<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#2c1810"/>
  <!-- Gold border ring -->
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#c9912a" stroke-width="6"/>

  <!-- Open book — left page -->
  <path d="M90 320 L90 175 Q90 155 110 155 L248 155 L248 345 Q218 332 170 332 Z" fill="#fdf6e3"/>
  <!-- Open book — right page -->
  <path d="M422 320 L422 175 Q422 155 402 155 L264 155 L264 345 Q294 332 342 332 Z" fill="#f0e6cc"/>
  <!-- Book spine -->
  <rect x="248" y="148" width="16" height="204" rx="4" fill="#c9912a"/>
  <!-- Shadow on right page -->
  <rect x="264" y="155" width="16" height="190" fill="#e0c89a" opacity="0.5"/>

  <!-- Lines on left page -->
  <rect x="118" y="196" width="112" height="5" rx="2.5" fill="#c9a875" opacity="0.7"/>
  <rect x="118" y="216" width="100" height="5" rx="2.5" fill="#c9a875" opacity="0.7"/>
  <rect x="118" y="236" width="108" height="5" rx="2.5" fill="#c9a875" opacity="0.7"/>
  <rect x="118" y="256" width="88"  height="5" rx="2.5" fill="#c9a875" opacity="0.7"/>
  <rect x="118" y="276" width="104" height="5" rx="2.5" fill="#c9a875" opacity="0.7"/>
  <rect x="118" y="296" width="96"  height="5" rx="2.5" fill="#c9a875" opacity="0.7"/>

  <!-- Lines on right page -->
  <rect x="282" y="196" width="112" height="5" rx="2.5" fill="#b89050" opacity="0.6"/>
  <rect x="282" y="216" width="100" height="5" rx="2.5" fill="#b89050" opacity="0.6"/>
  <rect x="282" y="236" width="108" height="5" rx="2.5" fill="#b89050" opacity="0.6"/>
  <rect x="282" y="256" width="88"  height="5" rx="2.5" fill="#b89050" opacity="0.6"/>
  <rect x="282" y="276" width="104" height="5" rx="2.5" fill="#b89050" opacity="0.6"/>
  <rect x="282" y="296" width="96"  height="5" rx="2.5" fill="#b89050" opacity="0.6"/>

  <!-- Gold "LP" monogram -->
  <text x="256" y="450" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="58" font-weight="700"
        fill="#c9912a" letter-spacing="4">LP</text>
</svg>
